<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>Login Akaun</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-main: #050816;
      --bg-card: #0b1020;
      --bg-input: #111827;
      --accent: #1d4ed8;
      --accent-soft: #1e40af;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --danger: #f97373;
      --success: #4ade80;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e3a8a 0, #020617 50%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(150deg, rgba(15,23,42,0.97), rgba(15,23,42,0.88));
      border-radius: 18px;
      padding: 24px 24px 20px;
      box-shadow:
        0 20px 40px rgba(0,0,0,0.7),
        0 0 0 1px rgba(148,163,184,0.1);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 16px;
      background: radial-gradient(circle at 25% 0, #38bdf8, #1d4ed8 40%, #020617 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 18px rgba(59,130,246,0.65);
      font-size: 18px;
      font-weight: 800;
      color: white;
    }

    .brand-text-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #a5b4fc;
    }

    .brand-text-sub {
      font-size: 11px;
      color: var(--text-muted);
    }

    h2 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    form {
      margin-top: 8px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #cbd5f5;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 9px 11px;
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.4);
      background-color: var(--bg-input);
      color: var(--text-main);
      font-size: 14px;
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, transform 0.05s ease;
      margin-bottom: 10px;
    }

    input::placeholder {
      color: #6b7280;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(37,99,235,0.4), 0 0 18px rgba(37,99,235,0.4);
      background-color: #020617;
      transform: translateY(-1px);
    }

    .top-info {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    button {
      width: 100%;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      margin-top: 4px;
      background: linear-gradient(135deg, var(--accent), #38bdf8);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow:
        0 10px 25px rgba(37,99,235,0.55),
        0 0 0 1px rgba(191,219,254,0.1);
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        0 14px 30px rgba(37,99,235,0.75),
        0 0 0 1px rgba(191,219,254,0.3);
    }

    button:active {
      transform: translateY(0);
      box-shadow:
        0 6px 16px rgba(15,23,42,0.8),
        0 0 0 1px rgba(191,219,254,0.2);
    }

    .status {
      min-height: 18px;
      font-size: 13px;
      margin-top: 10px;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--success);
    }

    .footer-links {
      margin-top: 18px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .pill-link {
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(30,64,175,0.3);
      border: 1px solid rgba(59,130,246,0.4);
      color: #bfdbfe;
    }

    .pill-link:hover {
      background: rgba(30,64,175,0.6);
    }

    @media (max-width: 480px) {
      .container {
        margin: 16px;
        padding: 20px 16px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="brand">
      <img src="LogoApmKlang.png" alt="Logo APM Klang" width="40">
      <div>
        <div class="brand-text-title">PENGURUSAN PEGAWAI KONTRAK APM SELANGOR</div>
        <div class="brand-text-sub">Login untuk akses dashboard</div>
      </div>
    </div>

    <h2>Login Akaun</h2>
    <p class="subtitle">Masukkan username dan password anda.</p>

    <form id="loginForm">
      <div class="top-info">
        <span>Pastikan maklumat tepat.</span>
        <a href="register.html">Belum ada akaun?</a>
      </div>

      <label for="username">Username</label>
      <input type="text" id="username" placeholder="NamaPengguna" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password anda" required>

      <button type="submit">
        Login
        <span>⮕</span>
      </button>
    </form>

    <p id="status" class="status"></p>

    <div class="footer-links">
      <span>Tip: Login akan kekal sehingga token tamat.</span>
      <a class="pill-link" href="register.html">Daftar Akaun Baharu</a>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz4Gsy9l0Uw8cX2pBBXECoWySZcRCT60Sq4rxfQYXyLUVlMLfqKVMlqWq1fOc6MhWTG/exec";

    const loginForm = document.getElementById("loginForm");
    const statusEl = document.getElementById("status");

    // Jika sudah ada token, cuba terus ke dashboard
    (function autoRedirectIfLoggedIn() {
      const token = localStorage.getItem("authToken");
      if (!token) return;

      // Optional: boleh terus redirect tanpa check, tapi kita check sekejap
      fetch(WEB_APP_URL + "?mode=check&token=" + encodeURIComponent(token))
        .then(res => res.json())
        .then(data => {
          if (data.valid) {
            window.location.href = "index.html";
          }
        })
        .catch(() => {});
    })();

    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      statusEl.textContent = "Sedang login...";
      statusEl.className = "status";

      const body = new URLSearchParams();
      body.append("action", "login");
      body.append("username", username);
      body.append("password", password);

      fetch(WEB_APP_URL, {
        method: "POST",
        body: body
      })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            localStorage.setItem("authToken", data.token);
            localStorage.setItem("authUser", data.username);

            statusEl.textContent = "Login berjaya! Mengalihkan...";
            statusEl.className = "status success";

            setTimeout(() => {
              window.location.href = "index.html";
            }, 1000);
          } else {
            statusEl.textContent = data.message || "Login gagal";
            statusEl.className = "status error";
          }
        })
        .catch(err => {
          console.error(err);
          statusEl.textContent = "Ralat sambungan.";
          statusEl.className = "status error";
        });
    });
  </script>

</body>
</html>
